backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://goldenhome-cms-test.netlify.app
display_url: https://goldenhome-cms-test.netlify.app
logo_url: /images/logo-dark.png

locale: "en"

collections:
  # ═══════════════════════════════════════════════════════════════════════════
  #  HOMEPAGE
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "homepage"
    label: "Homepage"
    description: "Main landing page — hero banner, services, statistics, brand story, product cards, and call-to-action."
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "_data/homepage.json"
        fields:
          - label: "Hero Banner"
            name: "hero"
            widget: "object"
            summary: "{{fields.heading1}} {{fields.heading2}}"
            collapsed: true
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string", hint: "Small text above the main heading (e.g., 'Factory-Direct Cabinetry — Aurora, Ontario')", required: true }
              - { label: "Heading Line 1 (Bold)", name: "heading1", widget: "string", hint: "First line of the hero heading, displayed in bold", required: true }
              - { label: "Heading Line 2 (Italic)", name: "heading2", widget: "string", hint: "Second line of the hero heading, displayed in italic", required: true }
              - { label: "Subheading", name: "sub", widget: "text", hint: "Short paragraph below the heading describing the value proposition", required: true }
              - { label: "Hero Image", name: "image", widget: "image", hint: "Main hero background image. Recommended: 1920x1080px, landscape.", required: true }
              - { label: "Primary Button Text", name: "btn1_text", widget: "string", hint: "Text for the main CTA button", required: true }
              - { label: "Primary Button Link", name: "btn1_link", widget: "string", hint: "URL the primary button links to", required: true }
              - { label: "Secondary Button Text", name: "btn2_text", widget: "string", hint: "Text for the secondary/outline button" }
              - { label: "Secondary Button Link", name: "btn2_link", widget: "string", hint: "URL the secondary button links to" }

          - label: "Services Cards"
            name: "services"
            widget: "list"
            hint: "Four service highlight cards shown below the hero."
            max: 4
            min: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Service Title", name: "title", widget: "string", required: true }
              - { label: "Service Description", name: "desc", widget: "text", required: true }

          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            hint: "Four key numbers displayed in the Our Story section."
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - { label: "Number", name: "num", widget: "string", hint: "The statistic (e.g., '25+', '1000+')", required: true }
              - { label: "Label", name: "label", widget: "string", hint: "What the number represents", required: true }

          - label: "Brand Story"
            name: "story"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Paragraph 1", name: "p1", widget: "text", required: true }
              - { label: "Paragraph 2", name: "p2", widget: "text" }
              - { label: "Story Image", name: "image", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Image Caption", name: "image_tag", widget: "string", hint: "Short caption overlaid on the image" }

          - label: "Products Section Header"
            name: "products_section"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Label", name: "label", widget: "string" }
              - { label: "Heading (Bold Part)", name: "heading1", widget: "string", required: true }
              - { label: "Heading (Italic Part)", name: "heading2", widget: "string" }
              - { label: "View All Button Text", name: "btn_text", widget: "string" }

          - label: "Product Cards"
            name: "product_cards"
            widget: "list"
            hint: "Product showcase cards with title, description, image, and link."
            max: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Product Title", name: "title", widget: "string", required: true }
              - { label: "Product Description", name: "desc", widget: "text", required: true }
              - { label: "Product Image", name: "image", widget: "image", hint: "Recommended: 600x400px", required: true }
              - { label: "Link URL", name: "link", widget: "string" }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PRODUCTS OVERVIEW
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "products"
    label: "Products Overview"
    description: "Products landing page — kitchen cabinet series, door colour swatches, closet collections, and vanity collections."
    files:
      - name: "products"
        label: "Products Page Content"
        file: "_data/products.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Label", name: "label", widget: "string", hint: "Breadcrumb text (e.g., 'Our Products')" }
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }

          - label: "Kitchen Cabinet Series"
            name: "kitchen_series"
            widget: "list"
            summary: "{{fields.name}}"
            collapsed: true
            fields:
              - { label: "Series ID", name: "id", widget: "string", hint: "Lowercase identifier (e.g., 'classic')", required: true }
              - { label: "Series Name", name: "name", widget: "string", required: true }
              - { label: "Tagline", name: "tagline", widget: "string", hint: "Short tagline for the series" }
              - { label: "Description", name: "desc", widget: "text", required: true }
              - { label: "Series Image", name: "image", widget: "image", required: true }
              - { label: "Door Colours", name: "door_colours", widget: "list", hint: "Door colour swatches for this series", summary: "{{fields.name}}", collapsed: true, fields: [{ label: "Colour Name", name: "name", widget: "string", required: true }, { label: "Swatch Image", name: "image", widget: "image", required: true }] }

          - label: "Closet Collections"
            name: "closets"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", required: true }
              - { label: "Section Description", name: "desc", widget: "text" }
              - label: "Collections"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                collapsed: true
                fields:
                  - { label: "Collection Name", name: "name", widget: "string", required: true }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Main Image", name: "image", widget: "image", required: true }
                  - { label: "Gallery Images", name: "gallery", widget: "list", fields: [{ label: "Image", name: "image", widget: "image" }] }

          - label: "Vanity Collections"
            name: "vanities"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", required: true }
              - { label: "Section Description", name: "desc", widget: "text" }
              - label: "Collections"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                collapsed: true
                fields:
                  - { label: "Collection Name", name: "name", widget: "string", required: true }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Main Image", name: "image", widget: "image", required: true }
                  - { label: "Gallery Images", name: "gallery", widget: "list", fields: [{ label: "Image", name: "image", widget: "image" }] }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  KITCHEN CABINETS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "kitchen_cabinets"
    label: "Kitchen Cabinets"
    description: "Kitchen Cabinets product page — page heading, intro text, and cabinet series details."
    files:
      - name: "kitchen_cabinets"
        label: "Kitchen Cabinets Content"
        file: "_data/kitchen_cabinets.json"
        fields:
          - { label: "Page Label", name: "label", widget: "string", hint: "Uppercase label (e.g., 'OUR PRODUCTS')", required: true }
          - { label: "Page Heading", name: "heading", widget: "string", required: true }
          - { label: "Intro Text", name: "intro", widget: "text", required: true }
          - label: "Cabinet Series"
            name: "series"
            widget: "list"
            summary: "{{fields.name}} — {{fields.door_count}}"
            collapsed: true
            fields:
              - { label: "Series ID", name: "id", widget: "string", hint: "Lowercase identifier (e.g., 'classic'). Do not change unless necessary.", required: true }
              - { label: "Series Name", name: "name", widget: "string", required: true }
              - { label: "Door Count", name: "door_count", widget: "string", hint: "e.g., '8 door colours available'", required: true }
              - { label: "Description", name: "desc", widget: "text", required: true }
              - { label: "Series Image", name: "image", widget: "image", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CLOSET & STORAGE
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "closet"
    label: "Closet & Storage"
    description: "Closet & Storage product page — collections, descriptions, and gallery images."
    files:
      - name: "closet"
        label: "Closet & Storage Content"
        file: "_data/closet.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }

          - label: "Closet Collections"
            name: "collections"
            widget: "list"
            summary: "{{fields.name}}"
            collapsed: true
            fields:
              - { label: "Collection Name", name: "name", widget: "string", required: true }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Main Image", name: "image", widget: "image", required: true }
              - { label: "Gallery Images", name: "gallery", widget: "list", fields: [{ label: "Image", name: "image", widget: "image" }] }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  BATHROOM VANITIES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "vanities"
    label: "Bathroom Vanities"
    description: "Bathroom Vanities product page — collections, descriptions, and gallery images."
    files:
      - name: "vanities"
        label: "Bathroom Vanities Content"
        file: "_data/vanities.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }

          - label: "Vanity Collections"
            name: "collections"
            widget: "list"
            summary: "{{fields.name}}"
            collapsed: true
            fields:
              - { label: "Collection Name", name: "name", widget: "string", required: true }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Main Image", name: "image", widget: "image", required: true }
              - { label: "Gallery Images", name: "gallery", widget: "list", fields: [{ label: "Image", name: "image", widget: "image" }] }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PROJECTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "projects"
    label: "Projects"
    description: "Projects portfolio page — before/after showcase, Canada projects, and global projects."
    files:
      - name: "projects"
        label: "Projects Page Content"
        file: "_data/projects.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }

          - label: "Before & After Showcase"
            name: "before_after"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", required: true }
              - { label: "Section Description", name: "desc", widget: "text" }
              - label: "Showcase Items"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                collapsed: true
                fields:
                  - { label: "Title", name: "title", widget: "string", required: true }
                  - { label: "Description", name: "desc", widget: "string" }
                  - { label: "Before Image", name: "before_image", widget: "image" }
                  - { label: "After Image", name: "after_image", widget: "image", required: true }

          - label: "Canada Projects"
            name: "canada"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", required: true }
              - { label: "Section Description", name: "desc", widget: "text" }
              - label: "Project Items"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                collapsed: true
                fields:
                  - { label: "Project Title", name: "title", widget: "string", required: true }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Image", name: "image", widget: "image", required: true }

          - label: "Global Projects"
            name: "global"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", required: true }
              - { label: "Section Description", name: "desc", widget: "text" }
              - label: "Project Items"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                collapsed: true
                fields:
                  - { label: "Project Title", name: "title", widget: "string", required: true }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Image", name: "image", widget: "image", required: true }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT (MAIN)
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "contact"
    label: "Contact Page"
    description: "Main contact page — dealer inquiry form, company info, distributor section, and design quote form."
    files:
      - name: "contact"
        label: "Contact Page Content"
        file: "_data/contact.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }

          - label: "Dealer Inquiry Section"
            name: "dealer_section"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Label", name: "label", widget: "string", hint: "e.g., 'Get in Touch'" }
              - { label: "Heading (Bold Part)", name: "heading1", widget: "string", required: true }
              - { label: "Heading (Italic Part)", name: "heading2", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }

          - label: "Company Information"
            name: "company"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Showroom Name", name: "showroom_name", widget: "string", required: true }
              - { label: "Address Line 1", name: "address1", widget: "string", required: true }
              - { label: "Address Line 2", name: "address2", widget: "string", required: true }
              - { label: "Phone Number", name: "phone", widget: "string", required: true }
              - { label: "Email Address", name: "email", widget: "string", required: true }
              - { label: "Business Hours Line 1", name: "hours1", widget: "string", required: true }
              - { label: "Business Hours Line 2", name: "hours2", widget: "string", required: true }

          - label: "About / Distributor Section"
            name: "distributor"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section Heading (Bold Part)", name: "heading1", widget: "string" }
              - { label: "Section Heading (Italic Part)", name: "heading2", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Section Image", name: "image", widget: "image" }

          - label: "Design Quote Section"
            name: "quote_section"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Offer Label", name: "offer_label", widget: "string", hint: "e.g., 'Exclusive Offer'" }
              - { label: "Heading (Bold Part)", name: "heading1", widget: "string" }
              - { label: "Heading (Italic Part)", name: "heading2", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT US (SECONDARY)
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "contact_us"
    label: "Contact Us Page"
    description: "Secondary contact page — page heading, intro text, and company information."
    files:
      - name: "contact_us"
        label: "Contact Us Content"
        file: "_data/contact_us.json"
        fields:
          - { label: "Page Label", name: "label", widget: "string", hint: "Uppercase label (e.g., 'GET IN TOUCH')", required: true }
          - { label: "Heading (Bold Part)", name: "heading1", widget: "string", required: true }
          - { label: "Heading (Italic Part)", name: "heading2", widget: "string", required: true }
          - { label: "Intro Text", name: "intro", widget: "text", required: true }
          - label: "Company Information"
            name: "company"
            widget: "object"
            fields:
              - { label: "Showroom Name", name: "showroom_name", widget: "string", required: true }
              - { label: "Address Line 1", name: "address1", widget: "string", required: true }
              - { label: "Address Line 2", name: "address2", widget: "string", required: true }
              - { label: "Phone Number", name: "phone", widget: "string", required: true }
              - { label: "Email Address", name: "email", widget: "string", required: true }
              - { label: "Business Hours Line 1", name: "hours1", widget: "string", required: true }
              - { label: "Business Hours Line 2", name: "hours2", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  ABOUT US
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "about_us"
    label: "About Us"
    description: "About Us page — company introduction, key statistics, and factory gallery."
    files:
      - name: "about_us"
        label: "About Us Content"
        file: "_data/about_us.json"
        fields:
          - { label: "Page Label", name: "label", widget: "string", hint: "Uppercase label (e.g., 'ABOUT GOLDENHOME')", required: true }
          - { label: "Page Heading", name: "heading", widget: "string", required: true }
          - { label: "Intro Paragraph", name: "intro", widget: "text", required: true }
          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - { label: "Number", name: "num", widget: "string", required: true }
              - { label: "Label", name: "label", widget: "string", required: true }
          - label: "Factory Gallery"
            name: "gallery"
            widget: "list"
            summary: "{{fields.alt}}"
            collapsed: true
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Recommended: 800x600px, landscape.", required: true }
              - { label: "Alt Text", name: "alt", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CATALOG & SPEC BOOK
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "catalog"
    label: "Catalog & Spec Book"
    description: "Downloads page — product catalog and spec book PDFs available for download."
    files:
      - name: "catalog"
        label: "Catalog & Spec Book Content"
        file: "_data/catalog.json"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }

          - label: "Downloadable Documents"
            name: "downloads"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Document Title", name: "title", widget: "string", required: true }
              - { label: "Edition / Subtitle", name: "edition", widget: "string", hint: "e.g., '2026 Edition'" }
              - { label: "Description", name: "desc", widget: "text", required: true }
              - { label: "Thumbnail Image", name: "thumbnail", widget: "image" }
              - { label: "PDF File Path", name: "file_url", widget: "string", hint: "Path to the PDF file (e.g., 'GoldenHome2026Catalog.pdf')", required: true }
              - { label: "Button Text", name: "btn_text", widget: "string", hint: "e.g., 'Download Catalog'" }

          - { label: "Notice Text", name: "notice", widget: "text", hint: "Disclaimer text shown below the downloads section." }

          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  INSTRUCTION GUIDELINES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "instructions"
    label: "Installation Guides"
    description: "Installation guides page — video tutorials for cabinet assembly, hardware, vanity, and closet installation."
    files:
      - name: "instructions"
