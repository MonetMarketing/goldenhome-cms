backend:
  name: git-gateway
  branch: main
media_folder: "images/uploads"
public_folder: "/images/uploads"
site_url: https://goldenhomecabinetrycanada.com
display_url: https://goldenhomecabinetrycanada.com
logo_url: /images/logo-dark.png
locale: "en"
collections:

  # ═══════════════════════════════════════════════════════════════════════════
  #  HOME
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "homepage"
    label: "Home"
    description: "Main landing page — hero banner, product categories, cabinet series, brand story, statistics, and call-to-action."
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "_data/homepage.json"
        fields:
          - label: "Hero Banner"
            name: "hero"
            widget: "object"
            summary: "{{fields.heading}}"
            collapsed: false
            fields:
              - { label: "Main Heading", name: "heading", widget: "string", hint: "The large headline on the hero (e.g., 'Stock Speed. Custom Precision.')", required: true }
              - { label: "Subheading", name: "sub", widget: "text", hint: "Short paragraph below the heading", required: true }
              - { label: "Hero Image", name: "image", widget: "image", hint: "Main hero image. Recommended: 1920x1080px, landscape.", required: true }
              - { label: "Primary Button Text", name: "btn1_text", widget: "string", required: true }
              - { label: "Primary Button Link", name: "btn1_link", widget: "string", hint: "URL (e.g., /kitchen-cabinets.html)", required: true }
              - { label: "Secondary Button Text", name: "btn2_text", widget: "string" }
              - { label: "Secondary Button Link", name: "btn2_link", widget: "string", hint: "URL (e.g., /projects.html)" }
          - label: "Product Categories (Services Section)"
            name: "services"
            widget: "list"
            hint: "Four product category cards shown in the 'Our Products' section below the hero."
            max: 4
            min: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Category Title", name: "title", widget: "string", required: true }
              - { label: "Category Description", name: "desc", widget: "text", required: true }
          - label: "Cabinet Series Cards"
            name: "cabinet_series"
            widget: "list"
            hint: "Four cabinet series cards (Classic, Delight, Grand, Luxury) shown in the products grid."
            max: 4
            min: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Series Name", name: "title", widget: "string", required: true }
              - { label: "Series Description", name: "desc", widget: "text", required: true }
          - label: "Cabinet Series Images"
            name: "cabinet_series_images"
            widget: "object"
            hint: "One image per series. Upload in order: Classic, Delight, Grand, Luxury."
            collapsed: true
            fields:
              - { label: "Classic Series Image", name: "classic", widget: "image", hint: "Card image. Recommended: 600x400px" }
              - { label: "Delight Series Image", name: "delight", widget: "image", hint: "Card image. Recommended: 600x400px" }
              - { label: "Grand Series Image", name: "grand", widget: "image", hint: "Card image. Recommended: 600x400px" }
              - { label: "Luxury Series Image", name: "luxury", widget: "image", hint: "Card image. Recommended: 600x400px" }
          - label: "Brand Story"
            name: "story"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Paragraph 1", name: "p1", widget: "text", required: true }
              - { label: "Paragraph 2", name: "p2", widget: "text" }
              - { label: "Story Image", name: "image", widget: "image", hint: "Recommended: 800x580px" }
              - { label: "Image Caption Tag", name: "image_tag", widget: "string", hint: "Short text overlaid on the image (e.g., 'Est. in Canada · Locally Installed')" }
          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            hint: "Four key numbers displayed in the Brand Story section."
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - { label: "Number", name: "num", widget: "string", hint: "The statistic (e.g., '25+', '1000+')", required: true }
              - { label: "Label", name: "label", widget: "string", required: true }
          - label: "Homepage Gallery"
            name: "gallery"
            widget: "object"
            hint: "Six gallery images shown in the homepage showcase section."
            collapsed: true
            fields:
              - { label: "Gallery Image 1", name: "img1", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Gallery Image 2", name: "img2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Gallery Image 3", name: "img3", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Gallery Image 4", name: "img4", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Gallery Image 5", name: "img5", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Gallery Image 6", name: "img6", widget: "image", hint: "Recommended: 800x600px" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "text" }
              - { label: "Button Text", name: "btn_text", widget: "string", required: true }
              - { label: "Button Link", name: "btn_link", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PRODUCTS > Kitchen Cabinets
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "kitchen_cabinets"
    label: "Products > Kitchen Cabinets"
    description: "Content for the Kitchen Cabinets product page — section intro and series descriptions."
    files:
      - name: "kitchen_cabinets"
        label: "Kitchen Cabinets Content"
        file: "_data/kitchen_cabinets.json"
        fields:
          - { label: "Section Label", name: "label", widget: "string", hint: "Small uppercase label (e.g., 'Kitchen Cabinetry')", required: true }
          - { label: "Page Heading", name: "heading", widget: "string", required: true }
          - { label: "Page Introduction", name: "intro", widget: "text", required: true }
          - label: "Series Content"
            name: "series"
            widget: "object"
            hint: "Text content for each cabinet series tab."
            collapsed: false
            fields:
              - { label: "Section Category Label", name: "section_category", widget: "string", hint: "e.g., 'Kitchen Cabinetry'" }
              - { label: "Section Heading (HTML allowed)", name: "section_heading", widget: "string", hint: "e.g., 'Kitchen <em>Cabinets</em>'" }
              - { label: "Section Intro Text", name: "section_intro", widget: "text" }
              - { label: "Classic Series Title", name: "classic_title", widget: "string" }
              - { label: "Classic Series Description", name: "classic_desc", widget: "text" }
              - { label: "Delight Series Title", name: "delight_title", widget: "string" }
              - { label: "Delight Series Description", name: "delight_desc", widget: "text" }
              - { label: "Grand Series Title", name: "grand_title", widget: "string" }
              - { label: "Grand Series Description", name: "grand_desc", widget: "text" }
              - { label: "Luxury Series Title", name: "luxury_title", widget: "string" }
              - { label: "Luxury Series Description", name: "luxury_desc", widget: "text" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button Link", name: "btn_link", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PRODUCTS > Closet & Storage
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "closet"
    label: "Products > Closet & Storage"
    description: "Content for the Closet & Storage product page."
    files:
      - name: "closet"
        label: "Closet & Storage Content"
        file: "_data/closet.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Page Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "string" }
          - { label: "Section Heading (HTML allowed)", name: "section_heading", widget: "string" }
          - { label: "Section Description", name: "section_desc", widget: "text" }
          - label: "Collection Names & Descriptions"
            name: "collections"
            widget: "object"
            hint: "Names and descriptions for each closet collection."
            collapsed: false
            fields:
              - { label: "Egger White — Collection Name", name: "egger_name", widget: "string" }
              - { label: "Egger White — Description", name: "egger_desc", widget: "text" }
              - { label: "Sheer Beauty — Collection Name", name: "sheer_name", widget: "string" }
              - { label: "Sheer Beauty — Description", name: "sheer_desc", widget: "text" }
          - label: "Closet Collection Images"
            name: "closet_images"
            widget: "object"
            hint: "Upload images for each closet collection."
            collapsed: true
            fields:
              - { label: "Egger White — Image 1", name: "egger_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Egger White — Image 2", name: "egger_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Egger White — Image 3", name: "egger_3", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Sheer Beauty — Image 1", name: "sheer_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Sheer Beauty — Image 2", name: "sheer_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Sheer Beauty — Image 3", name: "sheer_3", widget: "image", hint: "Recommended: 800x600px" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button Link", name: "btn_link", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PRODUCTS > Bathroom Vanities
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "vanities"
    label: "Products > Bathroom Vanities"
    description: "Content for the Bathroom Vanities product page."
    files:
      - name: "vanities"
        label: "Bathroom Vanities Content"
        file: "_data/vanities.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Page Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "string" }
          - { label: "Section Heading (HTML allowed)", name: "section_heading", widget: "string" }
          - { label: "Section Description", name: "section_desc", widget: "text" }
          - label: "Collection Names"
            name: "collections"
            widget: "object"
            hint: "Names for each vanity collection tab."
            collapsed: false
            fields:
              - { label: "Collection 1 Name", name: "glossy_name", widget: "string" }
              - { label: "Collection 2 Name", name: "shaker_name", widget: "string" }
              - { label: "Collection 3 Name", name: "walnut_name", widget: "string" }
              - { label: "Collection 4 Name", name: "darkwood_name", widget: "string" }
              - { label: "Collection 5 Name", name: "rusticoak_name", widget: "string" }
          - label: "Vanity Collection Images"
            name: "vanity_images"
            widget: "object"
            hint: "Upload images for each vanity collection."
            collapsed: true
            fields:
              - { label: "Glossy White — Image 1", name: "glossy_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Glossy White — Image 2", name: "glossy_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "White Shaker — Image 1", name: "shaker_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "White Shaker — Image 2", name: "shaker_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Walnut — Image 1", name: "walnut_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Walnut — Image 2", name: "walnut_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Dark Wood — Image 1", name: "darkwood_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Dark Wood — Image 2", name: "darkwood_2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Rustic Oak — Image 1", name: "rusticoak_1", widget: "image", hint: "Main image. Recommended: 800x600px" }
              - { label: "Rustic Oak — Image 2", name: "rusticoak_2", widget: "image", hint: "Recommended: 800x600px" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button Link", name: "btn_link", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  PROJECTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "projects"
    label: "Projects"
    description: "Content for the Projects showcase page — section headings."
    files:
      - name: "projects"
        label: "Projects Page Content"
        file: "_data/projects.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Page Heading", name: "heading", widget: "string", required: true }
              - { label: "Subheading", name: "sub", widget: "string" }
          - label: "Before & After Section"
            name: "before_after"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
          - label: "Canada Projects Section"
            name: "canada"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
          - label: "Global Projects Section"
            name: "global"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button Link", name: "btn_link", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SUPPORT > Instruction Guidelines
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "instructions"
    label: "Support > Instruction Guidelines"
    description: "Content for the Installation Guides page — page title, intro text, video tutorials, and CTA banner."
    files:
      - name: "instructions"
        label: "Instruction Guidelines Content"
        file: "_data/instructions.json"
        fields:
          - { label: "Page Title (HTML allowed)", name: "page_title", widget: "string", required: true }
          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - label: "Video Tutorials"
            name: "videos"
            widget: "list"
            hint: "YouTube video tutorials. Add, remove, or reorder videos."
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - { label: "Video Title", name: "title", widget: "string", required: true }
              - { label: "Category Tag", name: "tag", widget: "string", hint: "e.g., Hardware, Cabinet Assembly, Closet, Vanity", required: true }
              - { label: "Category ID", name: "category", widget: "string", hint: "Lowercase: hardware, cabinet, closet, or vanity", required: true }
              - { label: "YouTube Video ID", name: "youtube_id", widget: "string", hint: "The ID from the YouTube URL, e.g., 'YZ_rpeFcXow'", required: true }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SUPPORT > Order & Return Policy
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "order_policy"
    label: "Support > Order & Return Policy"
    description: "Full content for the Order & Return Policy page including all policy sections."
    files:
      - name: "order_policy"
        label: "Order & Return Policy Content"
        file: "_data/order_policy.json"
        fields:
          - { label: "Page Title (HTML allowed)", name: "page_title", widget: "string", required: true }
          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - label: "Policy Body Content"
            name: "body"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Order Section Title", name: "order_title", widget: "string" }
              - { label: "Order Section Content", name: "order_content", widget: "text", hint: "Use line breaks for paragraphs." }
              - { label: "Return Section Title", name: "return_title", widget: "string" }
              - { label: "Accepted Returns (Markdown list)", name: "return_accepted_items", widget: "text", hint: "Use '- ' for bullet points, **bold** for emphasis." }
              - { label: "Restocking Fee 1 — Percentage", name: "return_restock_fee_1_pct", widget: "string" }
              - { label: "Restocking Fee 1 — Label", name: "return_restock_fee_1_label", widget: "string" }
              - { label: "Restocking Fee 2 — Percentage", name: "return_restock_fee_2_pct", widget: "string" }
              - { label: "Restocking Fee 2 — Label", name: "return_restock_fee_2_label", widget: "string" }
              - { label: "Not Accepted Returns (Markdown list)", name: "return_not_accepted_items", widget: "text", hint: "Use '- ' for bullet points." }
              - { label: "Return Highlight Box", name: "return_highlight", widget: "text", hint: "Important notice text shown in a highlight box." }
              - { label: "Cancellation Section Title", name: "cancel_title", widget: "string" }
              - { label: "Cancellation Content", name: "cancel_content", widget: "text" }
              - { label: "Cancellation Fee 1 — Percentage", name: "cancel_fee_1_pct", widget: "string" }
              - { label: "Cancellation Fee 1 — Label", name: "cancel_fee_1_label", widget: "string" }
              - { label: "Cancellation Fee 2 — Percentage", name: "cancel_fee_2_pct", widget: "string" }
              - { label: "Cancellation Fee 2 — Label", name: "cancel_fee_2_label", widget: "string" }
              - { label: "Cancellation Footer Text", name: "cancel_footer", widget: "text" }
              - { label: "Cancellation Highlight Box", name: "cancel_highlight", widget: "text" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SUPPORT > Warranty & Certification
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "warranty"
    label: "Support > Warranty & Certification"
    description: "Full content for the Warranty & Certification page including all warranty sections."
    files:
      - name: "warranty"
        label: "Warranty & Certification Content"
        file: "_data/warranty.json"
        fields:
          - { label: "Page Title (HTML allowed)", name: "page_title", widget: "string", required: true }
          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - label: "Warranty Body Content"
            name: "body"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Section 1 Title", name: "section1_title", widget: "string" }
              - { label: "Section 1 Content", name: "section1_content", widget: "text" }
              - { label: "Section 1 Highlight Box", name: "section1_highlight", widget: "text" }
              - { label: "Section 1 Footer Text", name: "section1_footer", widget: "text" }
              - { label: "Section 2 Title", name: "section2_title", widget: "string" }
              - { label: "Section 2 Items (Markdown list)", name: "section2_items", widget: "text" }
              - { label: "Section 2 Highlight Box", name: "section2_highlight", widget: "text" }
              - { label: "Section 3 Title (Accreditations)", name: "section3_title", widget: "string" }
              - { label: "Section 3 Content", name: "section3_content", widget: "text", hint: "Leave empty if accreditations are shown as logos only." }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SUPPORT > Catalog & Spec Book
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "catalog"
    label: "Support > Catalog & Spec Book"
    description: "Content for the Catalog & Spec Book downloads page."
    files:
      - name: "catalog"
        label: "Catalog & Spec Book Content"
        file: "_data/catalog.json"
        fields:
          - { label: "Page Title (HTML allowed)", name: "page_title", widget: "string", required: true }
          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - { label: "Catalog Cover Image", name: "catalog_cover", widget: "image", hint: "Cover image for the product catalog card. Recommended: 400x560px (portrait)." }
          - { label: "Price Book Cover Image", name: "pricebook_cover", widget: "image", hint: "Cover image for the price book card. Recommended: 400x560px (portrait)." }
          - label: "Download Cards Content"
            name: "downloads"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Catalog Title", name: "catalog_title", widget: "string" }
              - { label: "Catalog Year/Edition", name: "catalog_year", widget: "string" }
              - { label: "Catalog Description", name: "catalog_desc", widget: "text" }
              - { label: "Catalog File Format", name: "catalog_format", widget: "string" }
              - { label: "Catalog File Size", name: "catalog_filesize", widget: "string" }
              - { label: "Catalog Edition Label", name: "catalog_edition", widget: "string" }
              - { label: "Catalog PDF Filename", name: "catalog_file", widget: "string", hint: "e.g., GoldenHome2026Catalog.pdf" }
              - { label: "Price Book Title", name: "pricebook_title", widget: "string" }
              - { label: "Price Book Description", name: "pricebook_desc", widget: "text" }
              - { label: "Notice Title", name: "notice_title", widget: "string" }
              - { label: "Notice Text", name: "notice_text", widget: "text" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }
              - { label: "Button Text", name: "btn_text", widget: "string" }
              - { label: "Button Link", name: "btn_link", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SUPPORT > Material Standards
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "materials"
    label: "Support > Material Standards"
    description: "Content for the Material Standards page — section text, tags, images, and CTA."
    files:
      - name: "materials"
        label: "Material Standards Content"
        file: "_data/materials.json"
        fields:
          - { label: "Page Title (HTML allowed)", name: "page_title", widget: "string", required: true }
          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - label: "Material Sections Content"
            name: "sections"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Section 1 Title (HTML allowed)", name: "section1_title", widget: "string" }
              - { label: "Section 1 Description", name: "section1_desc", widget: "text" }
              - { label: "Section 1 Tags (comma-separated)", name: "section1_tags", widget: "string", hint: "e.g., Multi-Layer Plywood, Cross-Grain, Superior Strength" }
              - { label: "Section 2 Title (HTML allowed)", name: "section2_title", widget: "string" }
              - { label: "Section 2 Description", name: "section2_desc", widget: "text" }
              - { label: "Section 2 Tags (comma-separated)", name: "section2_tags", widget: "string" }
              - { label: "Section 3 Title (HTML allowed)", name: "section3_title", widget: "string" }
              - { label: "Section 3 Description", name: "section3_desc", widget: "text" }
              - { label: "Section 3 Tags (comma-separated)", name: "section3_tags", widget: "string" }
          - label: "Section Images"
            name: "section_images"
            widget: "object"
            hint: "Three images shown alongside the material standard sections."
            collapsed: true
            fields:
              - { label: "Section Image 1", name: "img1", widget: "image", hint: "Recommended: 600x400px" }
              - { label: "Section Image 2", name: "img2", widget: "image", hint: "Recommended: 600x400px" }
              - { label: "Section Image 3", name: "img3", widget: "image", hint: "Recommended: 600x400px" }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Heading (HTML allowed)", name: "heading", widget: "string" }
              - { label: "Subtext", name: "sub", widget: "string" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT > Contact Us
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "contact_us"
    label: "Contact > Contact Us"
    description: "Content for the Contact Us page — section heading, intro, and showroom contact information."
    files:
      - name: "contact_us"
        label: "Contact Us Content"
        file: "_data/contact_us.json"
        fields:
          - { label: "Section Label", name: "label", widget: "string", required: true }
          - { label: "Section Heading", name: "heading", widget: "string", required: true }
          - { label: "Introduction Text", name: "intro", widget: "text", required: true }
          - { label: "Showroom Name", name: "showroom_name", widget: "string", hint: "e.g., 'AURORA SHOWROOM'" }
          - { label: "Address Line 1", name: "address1", widget: "string", required: true }
          - { label: "Address Line 2", name: "address2", widget: "string", required: true }
          - { label: "Phone Number", name: "phone", widget: "string", required: true }
          - { label: "Email Address", name: "email", widget: "string", required: true }
          - { label: "Business Hours — Days", name: "hours_days", widget: "string", required: true }
          - { label: "Business Hours — Time", name: "hours_time", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT > About Us
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "about_us"
    label: "Contact > About Us"
    description: "Content for the About Us page — section heading, introduction, key statistics, and factory images."
    files:
      - name: "about_us"
        label: "About Us Content"
        file: "_data/about_us.json"
        fields:
          - { label: "Section Label", name: "label", widget: "string", required: true }
          - { label: "Section Heading", name: "heading", widget: "string", required: true }
          - { label: "Introduction Paragraph", name: "intro", widget: "text", required: true }
          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            hint: "Four key statistics shown below the intro."
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - { label: "Number", name: "num", widget: "string", hint: "The statistic (e.g., '25+', '1000+')", required: true }
              - { label: "Label", name: "label", widget: "string", required: true }
          - label: "Factory & Facility Images"
            name: "factory_images"
            widget: "object"
            hint: "Up to 8 images shown in the factory/facility gallery section."
            collapsed: true
            fields:
              - { label: "Factory Image 1", name: "img1", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 2", name: "img2", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 3", name: "img3", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 4", name: "img4", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 5", name: "img5", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 6", name: "img6", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 7", name: "img7", widget: "image", hint: "Recommended: 800x600px" }
              - { label: "Factory Image 8", name: "img8", widget: "image", hint: "Recommended: 800x600px" }

  # ═══════════════════════════════════════════════════════════════════════════
  #  SITE SETTINGS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "settings"
    label: "Site Settings"
    description: "Global settings — footer tagline, copyright, and contact information used across all pages."
    files:
      - name: "settings"
        label: "Global Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Footer Tagline", name: "footer_tagline", widget: "string" }
          - { label: "Footer Copyright", name: "footer_copyright", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string", required: true }
          - { label: "Email Address", name: "email", widget: "string", required: true }
          - { label: "Address", name: "address", widget: "string", required: true }
          - { label: "Instagram URL", name: "social_instagram", widget: "string" }
          - { label: "Facebook URL", name: "social_facebook", widget: "string" }
          - { label: "YouTube URL", name: "social_youtube", widget: "string" }
