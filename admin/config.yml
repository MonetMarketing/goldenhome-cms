          - { label: "Page Intro", name: "page_intro", widget: "text", required: true }
          - { label: "Catalog Cover Image", name: "catalog_cover", widget: "image", hint: "Cover image for the product catalog PDF card. Recommended: 400x560px (portrait)." }
          - { label: "Price Book Cover Image", name: "pricebook_cover", widget: "image", hint: "Cover image for the price book PDF card. Recommended: 400x560px (portrait)." }
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
