backend:
  name: git-gateway
  branch: main

# Use Netlify's built-in media handling (stored in repo)
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Branding
site_url: https://goldenhome-cms-test.netlify.app
display_url: https://goldenhome-cms-test.netlify.app
logo_url: /images/logo-dark.png

# Locale
locale: "en"

collections:
  # ═══════════════════════════════════════════════════════════════════════════
  #  HOMEPAGE
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "homepage"
    label: "🏠 Homepage"
    description: "Edit the main landing page content — hero banner, services, stats, products, and call-to-action."
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "_data/homepage.json"
        fields:
          # ── Hero Section ──
          - label: "Hero Banner"
            name: "hero"
            widget: "object"
            summary: "{{fields.heading1}} {{fields.heading2}}"
            collapsed: true
            fields:
              - label: "Eyebrow Text"
                name: "eyebrow"
                widget: "string"
                hint: "Small text above the main heading (e.g., 'Factory-Direct Cabinetry — Aurora, Ontario')"
                required: true
              - label: "Heading Line 1 (Bold)"
                name: "heading1"
                widget: "string"
                hint: "First line of the hero heading, displayed in bold"
                required: true
              - label: "Heading Line 2 (Italic)"
                name: "heading2"
                widget: "string"
                hint: "Second line of the hero heading, displayed in italic"
                required: true
              - label: "Subheading"
                name: "sub"
                widget: "text"
                hint: "Short paragraph below the heading (1-2 sentences). Describe the value proposition."
                required: true
              - label: "Hero Image"
                name: "image"
                widget: "image"
                hint: "Main hero background image. Recommended: 1920×1080px, landscape orientation."
                required: true
              - label: "Primary Button Text"
                name: "btn1_text"
                widget: "string"
                hint: "Text for the main CTA button (e.g., 'Explore Our Products')"
                required: true
              - label: "Primary Button Link"
                name: "btn1_link"
                widget: "string"
                hint: "URL the primary button links to (e.g., 'kitchen-cabinets.html')"
                required: true
              - label: "Secondary Button Text"
                name: "btn2_text"
                widget: "string"
                hint: "Text for the secondary/outline button (e.g., 'Get Free Design Quote')"
              - label: "Secondary Button Link"
                name: "btn2_link"
                widget: "string"
                hint: "URL the secondary button links to"

          # ── Services Section ──
          - label: "Services Cards"
            name: "services"
            widget: "list"
            hint: "Four service highlight cards shown below the hero. Each card has a title and description."
            max: 4
            min: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - label: "Service Title"
                name: "title"
                widget: "string"
                hint: "Short title for this service (e.g., 'Factory-Direct Sourcing')"
                required: true
              - label: "Service Description"
                name: "desc"
                widget: "text"
                hint: "1-2 sentence description of this service"
                required: true

          # ── Stats Section ──
          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            hint: "Four key numbers displayed in the 'Our Story' section (e.g., '25+ Years of Craft')."
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - label: "Number"
                name: "num"
                widget: "string"
                hint: "The statistic number (e.g., '25+', '1000+', '2 wk')"
                required: true
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "Description of the number (e.g., 'Years of Craft', 'Cabinet Products')"
                required: true

          # ── Brand Story Section ──
          - label: "Brand Story"
            name: "story"
            widget: "object"
            hint: "The 'Our Story' narrative section with text and an image."
            collapsed: true
            fields:
              - label: "Paragraph 1"
                name: "p1"
                widget: "text"
                hint: "First paragraph of the brand story"
                required: true
              - label: "Paragraph 2"
                name: "p2"
                widget: "text"
                hint: "Second paragraph of the brand story"
              - label: "Story Image"
                name: "image"
                widget: "image"
                hint: "Image displayed alongside the story text. Recommended: 800×600px."
              - label: "Image Caption"
                name: "image_tag"
                widget: "string"
                hint: "Short caption overlaid on the image (e.g., 'Est. in Canada · Locally Installed')"

          # ── Products Section Header ──
          - label: "Products Section Header"
            name: "products_section"
            widget: "object"
            hint: "The heading area above the product cards."
            collapsed: true
            fields:
              - label: "Section Label"
                name: "label"
                widget: "string"
                hint: "Small label text above the heading (e.g., 'Our Products')"
              - label: "Heading (Bold Part)"
                name: "heading1"
                widget: "string"
                hint: "Bold portion of the section heading"
                required: true
              - label: "Heading (Italic Part)"
                name: "heading2"
                widget: "string"
                hint: "Italic portion of the section heading"
              - label: "View All Button Text"
                name: "btn_text"
                widget: "string"
                hint: "Text for the 'View All' link button"

          # ── Product Cards ──
          - label: "Product Cards"
            name: "product_cards"
            widget: "list"
            hint: "Product showcase cards (Kitchen, Vanity, Closet, Semi-Custom). Each card has a title, description, image, and link."
            max: 4
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - label: "Product Title"
                name: "title"
                widget: "string"
                hint: "Name of the product category (e.g., 'Kitchen', 'Vanity')"
                required: true
              - label: "Product Description"
                name: "desc"
                widget: "text"
                hint: "Brief description of this product category (1-2 sentences)"
                required: true
              - label: "Product Image"
                name: "image"
                widget: "image"
                hint: "Product category image. Recommended: 600×400px, consistent style across all cards."
                required: true
              - label: "Link URL"
                name: "link"
                widget: "string"
                hint: "Page URL this card links to (e.g., 'kitchen-cabinets.html')"

          # ── CTA Banner ──
          - label: "Call-to-Action Banner"
            name: "cta"
            widget: "object"
            hint: "The bottom banner that encourages visitors to take action."
            collapsed: true
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"
                hint: "Main CTA heading (e.g., 'Ready to explore your options?')"
                required: true
              - label: "Subheading"
                name: "sub"
                widget: "text"
                hint: "Supporting text below the heading (1 sentence)"
              - label: "Button Text"
                name: "btn_text"
                widget: "string"
                hint: "CTA button label (e.g., 'Get Free Design Quote')"
                required: true
              - label: "Button Link"
                name: "btn_link"
                widget: "string"
                hint: "URL the CTA button links to"
                required: true

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT US
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "contact_us"
    label: "📞 Contact Us"
    description: "Edit the Contact Us page — page heading, intro text, and company information."
    files:
      - name: "contact_us"
        label: "Contact Us Content"
        file: "_data/contact_us.json"
        fields:
          - label: "Page Label"
            name: "label"
            widget: "string"
            hint: "Small uppercase label above the heading (e.g., 'GET IN TOUCH')"
            required: true
          - label: "Heading (Bold Part)"
            name: "heading1"
            widget: "string"
            hint: "Bold portion of the page heading (e.g., 'Become Our')"
            required: true
          - label: "Heading (Italic Part)"
            name: "heading2"
            widget: "string"
            hint: "Italic portion of the page heading (e.g., 'Dealer')"
            required: true
          - label: "Intro Text"
            name: "intro"
            widget: "text"
            hint: "Introductory paragraph below the heading. Describe what happens after form submission."
            required: true
          - label: "Company Information"
            name: "company"
            widget: "object"
            hint: "Showroom address, phone, email, and business hours displayed on the contact page."
            collapsed: false
            fields:
              - label: "Showroom Name"
                name: "showroom_name"
                widget: "string"
                hint: "Name of the showroom location (e.g., 'AURORA SHOWROOM')"
                required: true
              - label: "Address Line 1"
                name: "address1"
                widget: "string"
                hint: "Street address (e.g., 'Unit 3 – 250 Don Hillock Dr #3')"
                required: true
              - label: "Address Line 2"
                name: "address2"
                widget: "string"
                hint: "City, province, postal code (e.g., 'Aurora, ON L4G 0G9')"
                required: true
              - label: "Phone Number"
                name: "phone"
                widget: "string"
                hint: "Contact phone number with area code (e.g., '(905) 727-8800')"
                required: true
              - label: "Email Address"
                name: "email"
                widget: "string"
                hint: "Contact email address (e.g., 'info@goldenhomecabinetry.ca')"
                required: true
              - label: "Business Hours Line 1"
                name: "hours1"
                widget: "string"
                hint: "Days of operation (e.g., 'Monday – Friday')"
                required: true
              - label: "Business Hours Line 2"
                name: "hours2"
                widget: "string"
                hint: "Operating hours (e.g., '9:00 AM – 5:00 PM')"
                required: true

  # ═══════════════════════════════════════════════════════════════════════════
  #  ABOUT US
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "about_us"
    label: "ℹ️ About Us"
    description: "Edit the About Us page — company intro, key statistics, and factory gallery images."
    files:
      - name: "about_us"
        label: "About Us Content"
        file: "_data/about_us.json"
        fields:
          - label: "Page Label"
            name: "label"
            widget: "string"
            hint: "Small uppercase label above the heading (e.g., 'ABOUT GOLDENHOME')"
            required: true
          - label: "Page Heading"
            name: "heading"
            widget: "string"
            hint: "Main heading of the About Us page"
            required: true
          - label: "Intro Paragraph"
            name: "intro"
            widget: "text"
            hint: "Company introduction paragraph. Describe the company's history, mission, and capabilities."
            required: true
          - label: "Key Statistics"
            name: "stats"
            widget: "list"
            hint: "Four impressive numbers about the company (e.g., factory size, inventory, series count, countries)."
            max: 4
            min: 4
            summary: "{{fields.num}} — {{fields.label}}"
            collapsed: true
            fields:
              - label: "Number"
                name: "num"
                widget: "string"
                hint: "The statistic (e.g., '8,900K+', '10K+')"
                required: true
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "What the number represents (e.g., 'Sq Ft Factory')"
                required: true
          - label: "Factory Gallery"
            name: "gallery"
            widget: "list"
            hint: "Photos of the factory, production line, and facilities. Add or remove images as needed."
            summary: "{{fields.alt}}"
            collapsed: true
            fields:
              - label: "Image"
                name: "image"
                widget: "image"
                hint: "Gallery photo. Recommended: 800×600px, landscape orientation."
                required: true
              - label: "Alt Text"
                name: "alt"
                widget: "string"
                hint: "Describe the image for accessibility (e.g., 'GoldenHome factory floor')"
                required: true

  # ═══════════════════════════════════════════════════════════════════════════
  #  KITCHEN CABINETS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "kitchen_cabinets"
    label: "🗄️ Kitchen Cabinets"
    description: "Edit the Kitchen Cabinets page — page heading, intro, and product series details."
    files:
      - name: "kitchen_cabinets"
        label: "Kitchen Cabinets Content"
        file: "_data/kitchen_cabinets.json"
        fields:
          - label: "Page Label"
            name: "label"
            widget: "string"
            hint: "Small uppercase label above the heading (e.g., 'OUR PRODUCTS')"
            required: true
          - label: "Page Heading"
            name: "heading"
            widget: "string"
            hint: "Main heading of the Kitchen Cabinets page"
            required: true
          - label: "Intro Text"
            name: "intro"
            widget: "text"
            hint: "Introductory paragraph describing the kitchen cabinet product line."
            required: true
          - label: "Cabinet Series"
            name: "series"
            widget: "list"
            hint: "Each series (Classic, Delight, Grand, Luxury) with its details. You can reorder, add, or edit series."
            summary: "{{fields.name}} — {{fields.door_count}}"
            collapsed: true
            fields:
              - label: "Series ID"
                name: "id"
                widget: "string"
                hint: "Unique identifier in lowercase (e.g., 'classic', 'delight', 'grand', 'luxury'). Do not change unless you know what you're doing."
                required: true
              - label: "Series Name"
                name: "name"
                widget: "string"
                hint: "Display name of the series (e.g., 'Classic Series')"
                required: true
              - label: "Door Count"
                name: "door_count"
                widget: "string"
                hint: "Number of available door colours (e.g., '8 door colours available')"
                required: true
              - label: "Description"
                name: "desc"
                widget: "text"
                hint: "1-2 sentence description of this series' style and features."
                required: true
              - label: "Series Image"
                name: "image"
                widget: "image"
                hint: "Representative image for this series. Recommended: 600×400px."
                required: true

  # ═══════════════════════════════════════════════════════════════════════════
  #  SITE SETTINGS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "settings"
    label: "⚙️ Site Settings"
    description: "Global settings — site name, logos, footer tagline, and navigation links."
    files:
      - name: "settings"
        label: "Global Settings"
        file: "_data/settings.json"
        fields:
          - label: "Site Name"
            name: "site_name"
            widget: "string"
            hint: "The name of the website, used in the browser tab title and metadata."
            required: true
          - label: "Logo (Dark Version)"
            name: "logo_dark"
            widget: "image"
            hint: "Dark-colored logo for use on light backgrounds. SVG or PNG recommended."
            required: true
          - label: "Logo (White Version)"
            name: "logo_white"
            widget: "image"
            hint: "White/light-colored logo for use on dark backgrounds. SVG or PNG recommended."
            required: true
          - label: "Footer Tagline"
            name: "footer_tagline"
            widget: "string"
            hint: "Short tagline displayed in the website footer."
          - label: "Footer Navigation Links"
            name: "footer_links"
            widget: "list"
            hint: "Links displayed in the footer navigation. Add, remove, or reorder as needed."
            summary: "{{fields.label}} → {{fields.url}}"
            collapsed: true
            fields:
              - label: "Link Text"
                name: "label"
                widget: "string"
                hint: "Visible text of the link (e.g., 'Privacy Policy')"
                required: true
              - label: "Link URL"
                name: "url"
                widget: "string"
                hint: "URL the link points to (e.g., '/privacy-policy.html' or 'https://...')"
                required: true
