          - { label: "Business Hours — Days", name: "hours_days", widget: "string", required: true }
          - { label: "Business Hours — Time", name: "hours_time", widget: "string", required: true }

  # ═══════════════════════════════════════════════════════════════════════════
  #  CONTACT > About Us
  # ═══════════════════════════════════════════════════════════════════════════
  - name: "about_us"
    label: "Contact › About Us"
